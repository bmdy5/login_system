name: login-clone2

services:
  mysql:
    image: mysql:8.4
    container_name: login-clone2-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-login_system}
    ports:
      - "3317:3306"
    volumes:
      - mysql_data_clone2:/var/lib/mysql
      - ../backend/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: login-clone2-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-login_system}
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DB_TIMEZONE: +08:00
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3012:3001"

  llm_api:
    build:
      context: ../llm_api
      dockerfile: Dockerfile
    container_name: login-clone2-llm-api
    restart: unless-stopped
    environment:
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3013}
    ports:
      - "8011:8000"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        API_PROXY_TARGET: http://backend:3001
        LLM_API_PROXY_TARGET: http://llm_api:8000
    container_name: login-clone2-frontend
    restart: unless-stopped
    environment:
      HOSTNAME: 0.0.0.0
    depends_on:
      - backend
      - llm_api
    ports:
      - "3013:3000"

volumes:
  mysql_data_clone2:

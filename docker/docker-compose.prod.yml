services:
  mysql:
    image: mysql:8.4
    container_name: login-system-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-login_system}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../backend/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: ${BACKEND_IMAGE}
    container_name: login-system-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-login_system}
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DB_TIMEZONE: +08:00
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3001:3001"

  llm_api:
    image: ${LLM_API_IMAGE:-xiaoliang7765/login-system-llm-api:1.0.0}
    container_name: login-system-llm-api
    restart: unless-stopped
    environment:
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: login-system-frontend
    restart: unless-stopped
    environment:
      HOSTNAME: 0.0.0.0
    depends_on:
      - backend
      - llm_api
    ports:
      - "3000:3000"

volumes:
  mysql_data:
